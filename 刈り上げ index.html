<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>校舎ナビ ｜ Saka-Navi</title>

<!--
  =====================================================================
  このファイルの構成メモ（初めて読む人向け）
  =====================================================================
  1. <style> ... </style>   → 見た目(CSS)。デザインのコンセプトは
                              「建築の設計図(ブループリント)」です。
  2. <model-viewer>         → Blenderで作った校舎3DモデルをWeb上で
                              回転・ズームできるようにする部品。
                              src="models/school.glb" の部分を、
                              GitHub上のご自身のファイルURLに置き換えてください。
  3. <script> ... </script> → 経路探索(BFS)のロジック。以前のコードに
                              あった Pyodide(Python実行環境) は使わず、
                              軽量なJavaScriptだけで同じ処理をしています。
  =====================================================================
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<!-- 3Dモデルを表示するための部品(Googleが提供する model-viewer) -->
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

<style>
  /* ---------- 基本トークン：色・余白などをここで一括管理 ---------- */
  :root{
    --ink-deep:      #131c30;   /* 図面の下地になる濃紺 */
    --ink-line:      #2c3f66;   /* グリッド線の色 */
    --ink-line-soft: rgba(126,155,214,0.16);
    --paper:         #f2e9d8;   /* トレーシングペーパー風のクリーム */
    --paper-dim:     #e4d7bd;
    --brass:         #c1793f;   /* 真鍮・銅のアクセント色 */
    --brass-bright:  #e0995c;
    --ivory:         #f6f1e6;
    --ink-text:      #241d14;
    --danger:        #b4472f;

    --font-display: 'Shippori Mincho', serif;
    --font-body:    'Zen Kaku Gothic New', sans-serif;
    --font-mono:    'JetBrains Mono', monospace;
  }

  *{ box-sizing: border-box; }

  html,body{
    margin:0;
    height:100%;
    background: var(--ink-deep);
    color: var(--ivory);
    font-family: var(--font-body);
    overflow-x:hidden;
  }

  /* 反射動作を抑えたい人向け（アクセシビリティ配慮） */
  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01ms !important; transition-duration:0.01ms !important; }
  }

  /* ---------- 設計図らしいグリッド背景 ---------- */
  .blueprint-grid{
    position:fixed;
    inset:0;
    z-index:0;
    background-image:
      linear-gradient(var(--ink-line-soft) 1px, transparent 1px),
      linear-gradient(90deg, var(--ink-line-soft) 1px, transparent 1px);
    background-size: 42px 42px;
    pointer-events:none;
  }
  .blueprint-grid::after{
    /* 大きめのグリッド線を重ねて図面らしい二重感を出す */
    content:"";
    position:absolute; inset:0;
    background-image:
      linear-gradient(var(--ink-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--ink-line) 1px, transparent 1px);
    background-size: 210px 210px;
    opacity:0.5;
  }

  /* ---------- 図面の四隅にある「レジストレーションマーク」 ----------
     建築図面や設計書にある十字の位置合わせマークを模した装飾。
     このサイトの「署名(signature)」的な要素です。 */
  .corner-mark{
    position:fixed;
    width:34px; height:34px;
    z-index:5;
    pointer-events:none;
    opacity:0.85;
  }
  .corner-mark svg{ width:100%; height:100%; }
  .corner-mark.tl{ top:18px; left:18px; }
  .corner-mark.tr{ top:18px; right:18px; transform:scaleX(-1); }
  .corner-mark.bl{ bottom:18px; left:18px; transform:scaleY(-1); }
  .corner-mark.br{ bottom:18px; right:18px; transform:scale(-1,-1); }

  /* ---------- ヘッダー ---------- */
  header{
    position:relative;
    z-index:2;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    padding: 28px 56px 0;
  }
  .brand{
    display:flex;
    align-items:baseline;
    gap:14px;
  }
  .brand .mark{
    font-family: var(--font-mono);
    font-size:12px;
    letter-spacing:0.18em;
    color: var(--brass-bright);
    border:1px solid var(--brass);
    padding:3px 8px;
    border-radius:3px;
  }
  .brand h1{
    font-family: var(--font-display);
    font-weight:800;
    font-size:22px;
    letter-spacing:0.06em;
    margin:0;
    color: var(--ivory);
  }
  .doc-number{
    font-family: var(--font-mono);
    font-size:11px;
    color: var(--ink-line-soft);
    letter-spacing:0.1em;
    text-align:right;
    line-height:1.6;
    color:#7e9bd6;
  }

  /* ---------- ヒーロー：3Dモデル + フォームを横並びに ---------- */
  main{
    position:relative;
    z-index:2;
    display:grid;
    grid-template-columns: 1.3fr 1fr;
    gap:32px;
    align-items:stretch;
    padding: 32px 56px 64px;
    min-height: calc(100vh - 96px);
  }

  /* 3Dビューア枠。図面の「図枠(ずわく)」風に角を切り欠いた線で囲う */
  .viewer-frame{
    position:relative;
    border:1px solid var(--ink-line);
    background: linear-gradient(180deg, rgba(44,63,102,0.35), rgba(19,28,48,0.1));
    min-height:520px;
    overflow:hidden;
  }
  .viewer-frame::before{
    /* 図枠の角の切り欠き装飾 */
    content:"";
    position:absolute; inset:10px;
    border:1px solid var(--ink-line-soft);
    pointer-events:none;
  }
  .viewer-label{
    position:absolute;
    top:16px; left:16px;
    z-index:3;
    font-family: var(--font-mono);
    font-size:11px;
    letter-spacing:0.14em;
    color: var(--brass-bright);
    background: rgba(19,28,48,0.7);
    padding:5px 10px;
    border:1px solid var(--brass);
  }
  model-viewer{
    width:100%;
    height:100%;
    min-height:520px;
    --poster-color: transparent;
  }
  .viewer-fallback{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:10px;
    text-align:center;
    padding:24px;
    color:#9fb3dd;
    font-size:13px;
    line-height:1.8;
  }

  /* ---------- 操作パネル（トレーシングペーパー風カード） ---------- */
  .panel{
    background: var(--paper);
    color: var(--ink-text);
    padding:38px 34px;
    position:relative;
    display:flex;
    flex-direction:column;
    justify-content:center;
  }
  .panel::before{
    content:"";
    position:absolute; inset:8px;
    border:1px solid rgba(36,29,20,0.18);
    pointer-events:none;
  }
  .panel-eyebrow{
    font-family: var(--font-mono);
    font-size:11px;
    letter-spacing:0.2em;
    color: var(--brass);
    margin-bottom:10px;
  }
  .panel h2{
    font-family: var(--font-display);
    font-size:28px;
    font-weight:800;
    margin:0 0 26px;
  }

  .field{
    margin-bottom:20px;
  }
  .field label{
    display:block;
    font-size:13px;
    color:#5c4f3a;
    margin-bottom:6px;
    letter-spacing:0.03em;
  }
  .field input{
    width:100%;
    padding:13px 14px;
    font-family: var(--font-mono);
    font-size:17px;
    letter-spacing:0.06em;
    background: var(--ivory);
    border:1px solid var(--paper-dim);
    border-bottom:2px solid var(--brass);
    color: var(--ink-text);
    outline:none;
    transition: border-color .15s ease, background .15s ease;
  }
  .field input::placeholder{ color:#b9ac8f; }
  .field input:focus{
    border-color: var(--brass);
    background:#fff;
  }
  .field input:focus-visible{
    outline:2px solid var(--brass);
    outline-offset:2px;
  }

  .go-btn{
    width:100%;
    padding:15px;
    margin-top:6px;
    border:none;
    background: var(--ink-deep);
    color: var(--ivory);
    font-family: var(--font-body);
    font-weight:700;
    font-size:15px;
    letter-spacing:0.08em;
    cursor:pointer;
    position:relative;
    overflow:hidden;
    transition: background .18s ease, transform .12s ease;
  }
  .go-btn:hover{ background:#1c2947; }
  .go-btn:active{ transform: scale(0.99); }
  .go-btn:focus-visible{ outline:2px solid var(--brass); outline-offset:2px; }

  /* ---------- 結果表示：経路を「点線でつながる工程」として描く ---------- */
  #result{
    margin-top:28px;
  }
  .route-empty{
    font-size:13px;
    color:#7a6c50;
    line-height:1.8;
  }
  .route-error{
    font-size:13px;
    color: var(--danger);
    line-height:1.8;
    border-left:3px solid var(--danger);
    padding-left:12px;
  }

  .route-list{
    list-style:none;
    margin:0;
    padding:0;
  }
  .route-list li{
    position:relative;
    display:flex;
    align-items:center;
    gap:14px;
    padding: 10px 0 10px 4px;
    opacity:0;
    transform: translateX(-8px);
    animation: step-in .38s ease forwards;
  }
  .route-list li:not(:last-child)::after{
    content:"";
    position:absolute;
    left:19px;
    top:38px;
    bottom:-6px;
    border-left:2px dotted var(--brass);
  }
  @keyframes step-in{
    to{ opacity:1; transform:translateX(0); }
  }
  .floor-badge{
    flex:none;
    width:38px; height:38px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family: var(--font-mono);
    font-size:12px;
    font-weight:600;
    background: var(--ink-deep);
    color: var(--brass-bright);
    border:1px solid var(--brass);
  }
  .step-room{
    font-family: var(--font-mono);
    font-size:16px;
    font-weight:600;
  }
  .step-tag{
    font-size:11px;
    color:#7a6c50;
    letter-spacing:0.05em;
    margin-left:2px;
  }

  .route-summary{
    margin-top:18px;
    padding-top:14px;
    border-top:1px solid var(--paper-dim);
    font-family: var(--font-mono);
    font-size:12px;
    color:#5c4f3a;
    letter-spacing:0.04em;
  }

  footer{
    position:relative;
    z-index:2;
    padding:18px 56px 26px;
    font-family: var(--font-mono);
    font-size:11px;
    color:#5f76ab;
    letter-spacing:0.08em;
    display:flex;
    justify-content:space-between;
  }

  /* ---------- レスポンシブ：スマホでは1カラムに ---------- */
  @media (max-width: 880px){
    header{ padding:20px 20px 0; flex-direction:column; gap:6px; }
    .doc-number{ text-align:left; }
    main{
      grid-template-columns: 1fr;
      padding: 20px 20px 40px;
    }
    .viewer-frame{ min-height:320px; }
    model-viewer{ min-height:320px; }
    footer{ padding:14px 20px 20px; flex-direction:column; gap:4px; }
  }
</style>
</head>

<body>

<!-- 背景の設計図グリッド -->
<div class="blueprint-grid" aria-hidden="true"></div>

<!-- 四隅のレジストレーションマーク（装飾） -->
<div class="corner-mark tl" aria-hidden="true"><svg viewBox="0 0 34 34"><path d="M2 2 L2 14 M2 2 L14 2" stroke="#c1793f" stroke-width="2" fill="none"/></svg></div>
<div class="corner-mark tr" aria-hidden="true"><svg viewBox="0 0 34 34"><path d="M2 2 L2 14 M2 2 L14 2" stroke="#c1793f" stroke-width="2" fill="none"/></svg></div>
<div class="corner-mark bl" aria-hidden="true"><svg viewBox="0 0 34 34"><path d="M2 2 L2 14 M2 2 L14 2" stroke="#c1793f" stroke-width="2" fill="none"/></svg></div>
<div class="corner-mark br" aria-hidden="true"><svg viewBox="0 0 34 34"><path d="M2 2 L2 14 M2 2 L14 2" stroke="#c1793f" stroke-width="2" fill="none"/></svg></div>

<header>
  <div class="brand">
    <span class="mark">SCH-01</span>
    <h1>校舎ナビ</h1>
  </div>
  <div class="doc-number">
    SAKA HIGH SCHOOL<br>
    WAYFINDING SYSTEM
  </div>
</header>

<main>

  <!-- ============ 左側：3Dモデルビューア ============ -->
  <div class="viewer-frame">
    <span class="viewer-label">FIG.01 — 3D MODEL</span>

    <!--
      3Dモデル本体は models/school.glb を参照しています。
      このHTMLファイルと同じ階層に「models」フォルダを置き、
      その中に school.glb を入れた状態でGitHubにアップロードしてください。
      （フォルダ構成の例は、このメッセージの下の説明を参照）
    -->
    <model-viewer
      id="schoolModel"
      src="models/school.glb"
      poster="サイエンス校舎ぱぱぱ.jpg"
      alt="校舎の3Dモデル"
      camera-controls
      auto-rotate
      auto-rotate-delay="1200"
      rotation-per-second="18deg"
      shadow-intensity="1"
      exposure="0.95"
      environment-image="neutral"
      style="background:transparent;">
      <div class="viewer-fallback" slot="poster">
        3Dモデルを読み込んでいます…<br>
        <span style="font-family:var(--font-mono); font-size:11px;">src属性にGLBファイルのURLを設定してください</span>
      </div>
    </model-viewer>
  </div>

  <!-- ============ 右側：操作パネル ============ -->
  <div class="panel">
    <div class="panel-eyebrow">ROUTE FINDER</div>
    <h2>経路を検索</h2>

    <div class="field">
      <label for="start">現在の部屋</label>
      <input id="start" placeholder="例）0401" inputmode="numeric" autocomplete="off">
    </div>

    <div class="field">
      <label for="end">目的の部屋</label>
      <input id="end" placeholder="例）0203" inputmode="numeric" autocomplete="off">
    </div>

    <button class="go-btn" onclick="findRoute()">案内を開始する</button>

    <div id="result">
      <p class="route-empty">部屋番号を入力すると、最短経路を表示します。</p>
    </div>
  </div>

</main>

<footer>
  <span>© SAKA HIGH SCHOOL</span>
  <span>BASED ON BLENDER 3D MODEL</span>
</footer>

<script>
/* =====================================================================
   経路探索ロジック（BFS：幅優先探索）
   以前のコードはPyodideでPythonを動かしていましたが、
   この処理はJavaScriptだけで十分高速に書けます。
   ===================================================================== */

const graph = {
  "0401":["0402","階段1"], "0402":["0401","0403"], "0403":["0402","0404"],
  "0404":["0403","0405"], "0405":["0404","0406"], "0406":["0405","0407"],
  "0407":["0406","階段2"],

  "0301":["0302","階段3"], "0302":["0301","0303"], "0303":["0302","0304"],
  "0304":["0303","0305"], "0305":["0304","0306"], "0306":["0305","0307"],
  "0307":["0306","階段4"],

  "0201":["0202","階段5"], "0202":["0201","0203"], "0203":["0202","0204"],
  "0204":["0203","0205"], "0205":["0204","0206"], "0206":["0205","0207"],
  "0207":["0206","0208"], "0208":["0207","階段6"],

  "0101":["0102","階段7"], "0102":["0101","0103"], "0103":["0102","0104"],
  "0104":["0103","0105"], "0105":["0104","0106"], "0106":["0105","昇降口"],

  "階段1":["0401","階段3"], "階段2":["0407","階段4"],
  "階段3":["階段1","0301","階段5"], "階段4":["階段2","0307","階段6"],
  "階段5":["階段3","0201","階段7"], "階段6":["階段4","0208","階段8"],
  "階段7":["階段5","0101"], "階段8":["階段6","玄関"],

  "玄関":["階段8"], "昇降口":["0106"]
};

function bfsFindRoute(start, end){
  const queue = [[start]];
  const visited = new Set();

  while (queue.length){
    const path = queue.shift();
    const node = path[path.length - 1];

    if (node === end) return path;

    if (!visited.has(node)){
      visited.add(node);
      for (const next of (graph[node] || [])){
        queue.push([...path, next]);
      }
    }
  }
  return null; // 見つからなかった場合
}

/* 部屋コードの先頭2桁を階数として扱う。階段・玄関などはラベルを変える */
function floorLabelOf(node){
  if (node.startsWith("階段")) return "STAIR";
  if (node === "玄関" || node === "昇降口") return "GATE";
  const floor = node.slice(0, 2);
  return `${parseInt(floor, 10)}F`;
}

function renderError(message){
  document.getElementById("result").innerHTML =
    `<p class="route-error">${message}</p>`;
}

function findRoute(){
  const startInput = document.getElementById("start");
  const endInput = document.getElementById("end");
  const start = startInput.value.trim();
  const end = endInput.value.trim();
  const resultBox = document.getElementById("result");

  if (!start || !end){
    renderError("現在の部屋と目的の部屋を、両方入力してください。");
    return;
  }
  if (!graph[start]){
    renderError(`「${start}」という部屋は見つかりませんでした。番号を確認してください。`);
    return;
  }
  if (!graph[end]){
    renderError(`「${end}」という部屋は見つかりませんでした。番号を確認してください。`);
    return;
  }

  const path = bfsFindRoute(start, end);

  if (!path){
    renderError("経路が見つかりませんでした。");
    return;
  }

  const items = path.map((node, i) => `
    <li style="animation-delay:${i * 90}ms">
      <span class="floor-badge">${floorLabelOf(node)}</span>
      <span class="step-room">${node}</span>
      ${i === 0 ? '<span class="step-tag">現在地</span>' : ''}
      ${i === path.length - 1 ? '<span class="step-tag">目的地</span>' : ''}
    </li>
  `).join("");

  resultBox.innerHTML = `
    <ul class="route-list">${items}</ul>
    <div class="route-summary">TOTAL STEPS — ${path.length - 1}</div>
  `;
}
</script>

</body>
</html>
